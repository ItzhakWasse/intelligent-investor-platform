services:
  postgres:
    image: postgres:16
    container_name: intelligent_investor_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intelligent_investor_db
    ports:
      - "5433:5432"
    volumes:
      - intelligent_investor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intelligent_investor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelligent_investor_backend
    restart: always
    environment:
      PORT: 5050
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/intelligent_investor_db?schema=public
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5050/api
    container_name: intelligent_investor_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  intelligent_investor_postgres_data: