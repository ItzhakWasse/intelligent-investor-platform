services:
  postgres:
    image: postgres:16
    container_name: intelligent_investor_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intelligent_investor_db
    ports:
      - "5433:5432"
    volumes:
      - intelligent_investor_postgres_data:/var/lib/postgresql/data

volumes:
  intelligent_investor_postgres_data: