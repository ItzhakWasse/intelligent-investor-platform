services:
  postgres:
    image: postgres:16
    container_name: intelligent_investor_staging_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intelligent_investor_staging_db
    ports:
      - "5434:5432"
    volumes:
      - intelligent_investor_staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intelligent_investor_staging_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: intelligent_investor_staging_backend
    restart: always
    environment:
      PORT: 5050
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/intelligent_investor_staging_db?schema=public
    ports:
      - "5051:5050"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node src/server.js"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5051
        VITE_APP_ENV: Staging
    container_name: intelligent_investor_staging_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
volumes:
  intelligent_investor_staging_postgres_data: